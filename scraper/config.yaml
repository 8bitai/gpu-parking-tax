# GPU Telemetry Scraper Configuration
# Uses Prometheus API (with DCGM Exporter as fallback)

prometheus_url: "${PROMETHEUS_URL}"

# TLS verification — set false if using self-signed certs
verify_ssl: false

# Poll interval in seconds for daemon mode
poll_interval: 30

# How far back to query per cycle (seconds). Slightly > poll_interval for overlap.
query_lookback: 60

# Step size for range queries (should match DCGM scrape interval)
query_step: "30s"

# Output directory for raw CSV files (one per day)
output_dir: "../data/telemetry"

# ============================================================
# METRICS — all 41 available DCGM metrics, grouped by purpose
# ============================================================
metrics:
  # --- Performance / Utilization ---
  performance:
    - DCGM_FI_DEV_GPU_UTIL          # SM utilization %
    - DCGM_FI_DEV_MEM_COPY_UTIL     # Memory copy engine utilization %
    - DCGM_FI_DEV_SM_CLOCK          # SM clock (MHz)
    - DCGM_FI_DEV_MEM_CLOCK         # Memory clock (MHz)
    - DCGM_FI_DEV_FB_USED           # Framebuffer used (MiB)
    - DCGM_FI_DEV_FB_FREE           # Framebuffer free (MiB)
    - DCGM_FI_DEV_FB_RESERVED       # Framebuffer reserved (MiB)
    - DCGM_FI_DEV_ENC_UTIL          # Encoder utilization %
    - DCGM_FI_DEV_DEC_UTIL          # Decoder utilization %

  # --- Profiling (KEY for workload fingerprinting) ---
  profiling:
    - DCGM_FI_PROF_GR_ENGINE_ACTIVE   # Graphics engine active ratio
    - DCGM_FI_PROF_SM_ACTIVE          # SM active ratio (more granular than GPU_UTIL)
    - DCGM_FI_PROF_SM_OCCUPANCY       # Warp occupancy ratio
    - DCGM_FI_PROF_DRAM_ACTIVE        # DRAM (HBM) bandwidth utilization ratio
    - DCGM_FI_PROF_PIPE_TENSOR_ACTIVE # Tensor core active ratio — LLM fingerprint
    - DCGM_FI_PROF_PIPE_FP16_ACTIVE   # FP16 pipe active ratio
    - DCGM_FI_PROF_PIPE_FP32_ACTIVE   # FP32 pipe active ratio
    - DCGM_FI_PROF_PIPE_FP64_ACTIVE   # FP64 pipe active ratio
    - DCGM_FI_PROF_PCIE_TX_BYTES      # PCIe TX bytes/sec
    - DCGM_FI_PROF_PCIE_RX_BYTES      # PCIe RX bytes/sec

  # --- Thermal / Power ---
  thermal_power:
    - DCGM_FI_DEV_GPU_TEMP           # GPU core temp (°C)
    - DCGM_FI_DEV_MEMORY_TEMP        # HBM temp (°C)
    - DCGM_FI_DEV_POWER_USAGE        # Power draw (W)
    - DCGM_FI_DEV_TOTAL_ENERGY_CONSUMPTION  # Cumulative energy (mJ)

  # --- Reliability / Errors ---
  reliability:
    - DCGM_FI_DEV_ECC_SBE_VOL_TOTAL  # Volatile single-bit ECC errors
    - DCGM_FI_DEV_ECC_DBE_VOL_TOTAL  # Volatile double-bit ECC errors
    - DCGM_FI_DEV_ECC_SBE_AGG_TOTAL  # Aggregate single-bit ECC (lifetime)
    - DCGM_FI_DEV_ECC_DBE_AGG_TOTAL  # Aggregate double-bit ECC (lifetime)
    - DCGM_FI_DEV_XID_ERRORS         # XID error count
    - DCGM_FI_DEV_CORRECTABLE_REMAPPED_ROWS    # Remapped rows (correctable)
    - DCGM_FI_DEV_UNCORRECTABLE_REMAPPED_ROWS  # Remapped rows (uncorrectable)
    - DCGM_FI_DEV_ROW_REMAP_FAILURE            # Row remap failure flag
    - DCGM_FI_DEV_PCIE_REPLAY_COUNTER          # PCIe replay errors

  # --- Violations (throttling events) ---
  violations:
    - DCGM_FI_DEV_POWER_VIOLATION       # Power throttling duration (us)
    - DCGM_FI_DEV_THERMAL_VIOLATION     # Thermal throttling duration (us)
    - DCGM_FI_DEV_BOARD_LIMIT_VIOLATION # Board power limit violation (us)
    - DCGM_FI_DEV_LOW_UTIL_VIOLATION    # Low utilization violation (us)
    - DCGM_FI_DEV_RELIABILITY_VIOLATION # Reliability violation (us)
    - DCGM_FI_DEV_SYNC_BOOST_VIOLATION  # Sync boost violation (us)

  # --- Interconnect ---
  interconnect:
    - DCGM_FI_DEV_NVLINK_BANDWIDTH_TOTAL  # NVLink total bandwidth
    - DCGM_FI_DEV_NVLINK_BANDWIDTH_L0     # NVLink link 0 bandwidth

  # --- Other ---
  other:
    - DCGM_FI_DEV_VGPU_LICENSE_STATUS  # vGPU license status

# Labels to extract from DCGM metrics
label_keys:
  - gpu
  - UUID
  - device
  - modelName
  - pci_bus_id
  - DCGM_FI_DEV_SERIAL
  - Hostname
  - DCGM_FI_DRIVER_VERSION
  - DCGM_FI_DEV_VBIOS_VERSION
  - DCGM_FI_NVML_VERSION
  - namespace
  - pod
  - container

# Workload classification rules (first match wins)
workload_rules:
  - category: "llm_inference"
    match:
      container_patterns: ["vllm*", "*-vllm", "*vllm*", "llm-serve-*"]
      namespace_patterns: ["inference"]

  - category: "embedding"
    match:
      container_patterns: ["embed-*", "embedding-*"]

  - category: "voice_ai"
    match:
      container_patterns: ["voice-*", "audio-*", "livekit*"]

  - category: "computer_vision"
    match:
      container_patterns: ["vision-*", "yolo*", "detectron*"]

  - category: "other"
    match:
      container_patterns: ["*"]

# Fallback: direct DCGM exporter endpoints (used with --direct flag)
dcgm_endpoints:
  - url: "${DCGM_EXPORTER_URL}"
    name: "${DCGM_EXPORTER_NAME}"
